apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: iscsiluksvolumes.storage.nikita.dev
spec:
  group: storage.nikita.dev
  names:
    categories: []
    kind: IscsiLuksVolume
    plural: iscsiluksvolumes
    shortNames:
    - ilv
    singular: iscsiluksvolume
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.persistentVolumeName
      name: PV
      type: string
    - jsonPath: .spec.capacity
      name: Capacity
      type: string
    - jsonPath: .spec.target.iqn
      name: Target
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: IscsiLuksVolume describes one static iSCSI LUN opened through LUKS on a node
        properties:
          spec:
            properties:
              allowFormat:
                default: false
                type: boolean
              capacity:
                type: string
              chapSecretRef:
                nullable: true
                properties:
                  name:
                    type: string
                  passwordKey:
                    default: password
                    type: string
                  usernameKey:
                    default: username
                    type: string
                required:
                - name
                type: object
              fsType:
                default: ext4
                type: string
              luksSecretRef:
                properties:
                  key:
                    type: string
                  name:
                    type: string
                required:
                - key
                - name
                type: object
              storageClassName:
                nullable: true
                type: string
              target:
                properties:
                  iqn:
                    type: string
                  lun:
                    format: uint32
                    minimum: 0.0
                    type: integer
                  portal:
                    type: string
                required:
                - iqn
                - lun
                - portal
                type: object
            required:
            - capacity
            - luksSecretRef
            - target
            type: object
          status:
            nullable: true
            properties:
              message:
                nullable: true
                type: string
              observedGeneration:
                format: int64
                nullable: true
                type: integer
              persistentVolumeName:
                nullable: true
                type: string
              phase:
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: IscsiLuksVolume
        type: object
    served: true
    storage: true
    subresources:
      status: {}
