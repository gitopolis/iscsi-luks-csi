apiVersion: v1
kind: Pod
metadata:
  name: iscsi-luks-smoke
spec:
  restartPolicy: Never
  containers:
  - name: smoke
    image: busybox:1.36
    command:
    - sh
    - -c
    - date >> /mnt/iscsi-luks-csi-smoke.txt && cat /mnt/iscsi-luks-csi-smoke.txt && sleep 3600
    volumeMounts:
    - name: data
      mountPath: /mnt
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: data-iscsi-luks
