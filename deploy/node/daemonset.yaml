apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: iscsi-luks-csi-node
  namespace: kube-system
  labels:
    app.kubernetes.io/name: iscsi-luks-csi
    app.kubernetes.io/component: node
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: iscsi-luks-csi
      app.kubernetes.io/component: node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iscsi-luks-csi
        app.kubernetes.io/component: node
    spec:
      serviceAccountName: iscsi-luks-csi-node
      hostNetwork: true
      containers:
      - name: driver
        image: ghcr.io/gitopolis/iscsi-luks-csi:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        args:
        - |
          /usr/sbin/iscsid || true
          exec /iscsi-luks-csi
        env:
        - name: CSI_ENDPOINT
          value: unix:///csi/csi.sock
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
          mountPropagation: Bidirectional
        - name: dev
          mountPath: /dev
        - name: initiatorname
          mountPath: /etc/iscsi/initiatorname.iscsi
          readOnly: true
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
        - name: sys
          mountPath: /sys
      - name: node-driver-registrar
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.14.0
        args:
        - --csi-address=/csi/csi.sock
        - --kubelet-registration-path=/var/lib/kubelet/plugins/dev.gitopolis.iscsi-luks-csi/csi.sock
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: registration-dir
          mountPath: /registration
      volumes:
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/dev.gitopolis.iscsi-luks-csi
          type: DirectoryOrCreate
      - name: registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
      - name: kubelet-dir
        hostPath:
          path: /var/lib/kubelet
          type: Directory
      - name: dev
        hostPath:
          path: /dev
          type: Directory
      - name: initiatorname
        hostPath:
          path: /etc/iscsi/initiatorname.iscsi
          type: File
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
